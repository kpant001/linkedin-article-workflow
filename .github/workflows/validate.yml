name: Validate Skill

on:
  push:
    branches: [main]
    paths:
      - 'linkedin-article-workflow/**'
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Skill & Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install skill validator
        run: pip install skills-ref

      - name: Validate SKILL.md
        run: agentskills validate linkedin-article-workflow/

      - name: Check CHANGELOG format
        run: |
          echo "Checking CHANGELOG.md exists and has content..."
          test -f CHANGELOG.md || (echo "CHANGELOG.md missing" && exit 1)
          grep -q '## \[' CHANGELOG.md || (echo "CHANGELOG.md has no version entries" && exit 1)
          echo "CHANGELOG.md format OK"

      - name: Check VERSION file
        run: |
          echo "Checking VERSION file..."
          test -f VERSION || (echo "VERSION file missing" && exit 1)
          VERSION=$(cat VERSION)
          echo "Current version: $VERSION"
          echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || (echo "VERSION is not valid semver: $VERSION" && exit 1)
          echo "VERSION format OK"

      - name: Check required files exist
        run: |
          echo "Checking required repository files..."
          for file in README.md LICENSE CHANGELOG.md CONTRIBUTING.md CODE_OF_CONDUCT.md .github/CODEOWNERS; do
            test -f "$file" || (echo "Missing required file: $file" && exit 1)
            echo "  ok $file"
          done
          echo "All required files present"
